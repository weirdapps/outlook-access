# SonarCloud configuration for TypeScript/JavaScript projects
# Replace weirdapps, weirdapps_outlook-access, and Outlook Access with your values

sonar.organization=weirdapps
sonar.projectKey=weirdapps_outlook-access
sonar.projectName=Outlook Access

# Source code location
sonar.sources=.
sonar.sourceEncoding=UTF-8

# TypeScript/JavaScript settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/.venv/**,\
  **/test_scripts/**,\
  **/*.test.ts,\
  **/*.test.js,\
  **/*.spec.ts,\
  **/*.spec.js

# Test exclusions
sonar.test.exclusions=\
  **/test_scripts/**,\
  **/*.test.ts,\
  **/*.test.js,\
  **/*.spec.ts,\
  **/*.spec.js

# Coverage exclusions — Playwright browser-automation orchestration (real-browser
# launch + token capture) and the CLI composition root are verified via the
# `login` smoke test and live integration, not unit tests, so line coverage on
# them is misleading. Unit-testable logic (parsers, HTTP clients, sharepoint-
# capture, session schema, formatters) stays measured.
sonar.coverage.exclusions=\
  **/auth/browser-capture.ts,\
  **/commands/login.ts,\
  **/commands/auth-renew.ts,\
  **/cli.ts,\
  vitest.config.ts
