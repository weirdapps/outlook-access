name: Monthly Dependency Refresh
'on':
  schedule:
    - cron: '47 5 12 * *'
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: deps-refresh
  cancel-in-progress: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # actions/setup-node v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '22'
          cache: 'npm'
      - name: Refresh dependencies
        run: |
          npm update
          npm install
      - name: Validate
        run: |
          npm run lint
          npm run build
          npm test
      # peter-evans/create-pull-request v8.1.1
      - name: Open PR with refreshed lockfile
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          token: ${{ secrets.PUSH_PAT || github.token }}
          branch: deps/monthly-refresh
          delete-branch: true
          commit-message: 'deps: monthly dependency refresh'
          title: 'deps: monthly dependency refresh'
          body: |
            Automated monthly `npm update`. Validation (lint, build, test) passed on this branch.
            Review and merge if green.
          labels: dependencies
