name: Monthly Dependency Refresh
'on':
  schedule:
    - cron: '47 5 12 * *'
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
jobs:
  refresh:
    uses: weirdapps/shared-workflows/.github/workflows/deps-refresh.yml@main
    with:
      node_version: '22'
      gate_cmd: npm run lint && npm run build && npm test
    secrets: inherit
